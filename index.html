<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <style>
        /* Base Styling & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212; /* Dark, clean background */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Container Card */
        .card {
            max-width: 500px;
            width: 100%;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid #2a2a2a;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .subtitle {
            color: #a0a0a0;
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* Action Button */
        .btn {
            background-color: #ffffff;
            color: #121212;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: #e0e0e0;
            transform: translateY(-1px);
        }

        /* Hidden Message Section */
        .hidden-message {
            display: none;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 1px solid #2a2a2a;
            color: #e0e0e0;
            line-height: 1.6;
            text-align: left;
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Happy Birthday, Avni.</h1>
        <p class="subtitle">A small space built entirely for you.</p>
        
        <button class="btn" id="revealBtn">Open Letter</button>

        <div class="hidden-message" id="messageBox">
            <p>This is where your main message will go. Right now, this is just a blank structural layout, but we can expand this into scrollable chapters, memory grids, or interactive elements later on.</p>
        </div>
    </div>

    <script>
        // Simple logic to reveal the message box when clicked
        const btn = document.getElementById('revealBtn');
        const messageBox = document.getElementById('messageBox');

        btn.addEventListener('click', () => {
            if (messageBox.style.display === 'block') {
                messageBox.style.display = 'none';
                btn.textContent = 'Open Letter';
            } else {
                messageBox.style.display = 'block';
                btn.textContent = 'Close Letter';
            }
        });
    </script>
</body>
</html>
